name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # The headless harness runs the REAL engine in Node — the same 38 checks
      # used locally before every release.
      - run: npm run diag

  # Windows artifacts are built + published locally (npm run release); CI adds
  # the platforms this project can't build at home.
  release-mac-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx electron-vite build
      - run: npx electron-builder --publish never
      - name: Upload to the GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          # The release is normally created by the local publish step moments
          # after the tag lands; create it if we somehow beat it here.
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "See CHANGELOG.md."
          shopt -s nullglob
          files=(dist/*.dmg dist/*.AppImage dist/*.tar.gz)
          for f in dist/*.zip; do
            [[ "$RUNNER_OS" == "macOS" ]] && files+=("$f")
          done
          gh release upload "$tag" "${files[@]}" --clobber
